name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0-dev.3146+0606af509

      - name: Run Zig tests
        run: zig build zig-test

  build-windows:
    needs: test
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0-dev.3146+0606af509

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.2'
          arch: 'win64_msvc2022_64'
          modules: 'qtmultimedia'

      - name: Build Pencil2D
        shell: pwsh
        run: zig build "-Dqt-prefix=$env:QT_ROOT_DIR" -Doptimize=ReleaseSafe

      - name: Package
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $dir = "pencil2d-$version-windows-x64"
          New-Item -ItemType Directory -Path $dir
          Copy-Item zig-out/bin/pencil2d.exe $dir/
          & "$env:QT_ROOT_DIR/bin/windeployqt.exe" --release "$dir/pencil2d.exe"
          Compress-Archive -Path $dir -DestinationPath "$dir.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pencil2d-${{ github.ref_name }}-windows-x64
          path: pencil2d-${{ github.ref_name }}-windows-x64.zip

  build-macos:
    needs: test
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0-dev.3146+0606af509

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.2'
          modules: 'qtmultimedia'

      - name: Build Pencil2D
        run: zig build -Dqt-prefix="$QT_ROOT_DIR" -Doptimize=ReleaseSafe

      - name: Package
        run: |
          version="${{ github.ref_name }}"
          dir="pencil2d-${version}-macos-arm64"
          mkdir -p "$dir"
          cp zig-out/bin/pencil2d "$dir/"
          "$QT_ROOT_DIR/bin/macdeployqt" "$dir/pencil2d" || true
          tar czf "${dir}.tar.gz" "$dir"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pencil2d-${{ github.ref_name }}-macos-arm64
          path: pencil2d-${{ github.ref_name }}-macos-arm64.tar.gz

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.zip
            artifacts/**/*.tar.gz
