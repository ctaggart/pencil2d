name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Run Zig tests
        run: zig build zig-test

  build-windows:
    needs: test
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Download static Qt
        shell: pwsh
        run: |
          curl -L https://github.com/ctaggart/qt5/releases/download/v6.8.3/qt-static-6.8.3-x86_64-windows-msvc.tar.xz -o qt-static.tar.xz
          tar xf qt-static.tar.xz

      - name: Build Pencil2D
        shell: pwsh
        run: zig build "-Dqt-prefix=qt-static-6.8.3-x86_64-windows-msvc" -Dqt-static=true -Doptimize=ReleaseSafe

      - name: Package
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $dir = "pencil2d-$version-windows-x64"
          New-Item -ItemType Directory -Path $dir
          Copy-Item zig-out/bin/pencil2d.exe $dir/
          Compress-Archive -Path $dir -DestinationPath "$dir.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pencil2d-${{ github.ref_name }}-windows-x64
          path: pencil2d-${{ github.ref_name }}-windows-x64.zip

  build-macos:
    needs: test
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Download static Qt
        run: curl -L https://github.com/ctaggart/qt5/releases/download/v6.8.3/qt-static-6.8.3-aarch64-macos.tar.xz | tar xJ

      - name: Build Pencil2D
        run: zig build -Dqt-prefix="qt-static-6.8.3-aarch64-macos" -Dqt-static=true -Doptimize=ReleaseSafe

      - name: Package
        run: |
          version="${{ github.ref_name }}"
          dir="pencil2d-${version}-macos-arm64"
          app="zig-out/bin/Pencil2D Animation.app"
          mkdir -p "$dir"
          cp -R "$app" "$dir/"
          tar czf "${dir}.tar.gz" "$dir"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pencil2d-${{ github.ref_name }}-macos-arm64
          path: pencil2d-${{ github.ref_name }}-macos-arm64.tar.gz

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.zip
            artifacts/**/*.tar.gz
