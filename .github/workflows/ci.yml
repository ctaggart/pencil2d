name: CI

on:
  push:
    branches: [zig]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Check formatting
        run: zig fmt --check zig_src/

      - name: Run Zig tests
        run: zig build zig-test

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Download static Qt
        shell: pwsh
        run: |
          curl -L https://github.com/ctaggart/qt5/releases/download/v6.11.0/qt-static-6.11.0-x86_64-windows-msvc.tar.xz -o qt-static.tar.xz
          tar xf qt-static.tar.xz

      - name: Build Pencil2D
        shell: pwsh
        run: zig build "-Dqt-prefix=qt-static-6.11.0-x86_64-windows-msvc" -Dqt-static=true

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Download static Qt
        run: curl -L https://github.com/ctaggart/qt5/releases/download/v6.11.0/qt-static-6.11.0-aarch64-macos.tar.xz | tar xJ

      - name: Build Pencil2D
        run: zig build -Dqt-prefix="qt-static-6.11.0-aarch64-macos" -Dqt-static=true
