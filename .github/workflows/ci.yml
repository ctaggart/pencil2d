name: CI

on:
  push:
    branches: [zig]
  pull_request:
    branches: [zig]

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0-dev.3146+0606af509

      - name: Check formatting
        run: zig fmt --check zig_src/

      - name: Run Zig tests
        run: zig test zig_src/pencil2d.zig

      - name: Build MCP server
        run: zig build-exe zig_src/mcp_server.zig --name pencil2d-mcp
