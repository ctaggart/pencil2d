name: CI

on:
  push:
    branches: [zig]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0-dev.3146+0606af509

      - name: Check formatting
        run: zig fmt --check zig_src/

      - name: Run Zig tests
        run: zig build zig-test

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0-dev.3146+0606af509

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.2'
          arch: 'win64_msvc2022_64'
          modules: 'qtmultimedia'

      - name: Build Pencil2D
        shell: pwsh
        run: zig build "-Dqt-prefix=$env:QT_ROOT_DIR"
